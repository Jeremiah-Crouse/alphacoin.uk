<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Contact Admin - alphacoin.uk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: white;
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
    }

    textarea {
      resize: vertical;
      min-height: 150px;
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0052a3;
    }

    button:active {
      background: #003d7a;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #1a1a1a;
      margin: -20px -20px 30px -20px;
      border-radius: 8px 8px 0 0;
    }

    .nav-bar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .nav-bar a:hover {
      color: #3399ff;
    }

    .nav-bar a.active {
      border-bottom: 2px solid #3399ff;
    }

    .links {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
    }

    .links a {
      color: #0066cc;
      text-decoration: none;
      margin: 0 10px;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/feed.html">Ledger</a>
      <a href="/about.html">Strategy</a>
      <a href="/contact.html" class="active">Contact</a>
    </div>
    <div class="header">
      <div class="logo">
        <img src="images/acl.svg" alt="alphacoin">
      </div>
      <h1>Contact Admin</h1>
    </div>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" maxlength="2000" required placeholder="Tell Admin what's on your mind..."></textarea>
      </div>

      <div class="form-group">
        <label for="requestFollowUp">
          <input type="checkbox" id="requestFollowUp" name="requestFollowUp" checked>
          Request Follow-Up
        </label>
      </div>

      <button type="submit">Send Message</button>

      <div id="status" class="status"></div>
    </form>

    <div class="links">
      <a href="/">← Back</a>
      <a href="/feed.html">View Feed →</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const statusDiv = document.getElementById('status');

    const followUpCheckbox = document.getElementById('requestFollowUp');

    // Load preference
    const savedPref = localStorage.getItem('requestFollowUp');
    if (savedPref !== null) {
      followUpCheckbox.checked = savedPref === 'true';
    }

    // Save preference on change
    followUpCheckbox.addEventListener('change', (e) => {
      localStorage.setItem('requestFollowUp', e.target.checked);
    });

    // Include in form submission
    // When fetching/posting: body: JSON.stringify({ ..., requestFollowUp: followUpCheckbox.checked })


    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const requestFollowUp = document.getElementById('requestFollowUp').checked;

      if (!name || !email || !message) {
        statusDiv.className = 'status error';
        statusDiv.textContent = 'Please fill in all fields.';
        return;
      }

      statusDiv.className = 'status loading';
      statusDiv.textContent = 'Sending your message...';

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message, requestFollowUp })
        });

        const data = await response.json();

        if (response.ok) {
          statusDiv.className = 'status success';
          statusDiv.textContent = 'Message sent! Thank you for reaching out. You will be redirected shortly.';
          form.reset();

          setTimeout(() => {
            window.location.href = '/feed.html';
          }, 2000);
        } else {
          statusDiv.className = 'status error';
          statusDiv.textContent = data.error || 'Failed to send message. Please try again.';
        }
      } catch (error) {
        statusDiv.className = 'status error';
        statusDiv.textContent = 'Network error. Please try again.';
        console.error('Error:', error);
      }
    });
  </script>
</body>
</html>
