<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Strategy - alphacoin.uk</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #1a1a1a;
      margin: -40px -40px 30px -40px;
      border-radius: 8px 8px 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-bar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .nav-bar a:hover { color: #3399ff; }
    .nav-bar a.active { border-bottom: 2px solid #3399ff; }
    .strategy-content {
      line-height: 1.6;
      color: #333;
    }
    .strategy-content h1 { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .strategy-content h2 { margin: 30px 0 15px; }
    .strategy-content p { margin-bottom: 15px; }
    .strategy-content ul { margin: 0 0 15px 20px; }
    .strategy-content li { margin-bottom: 5px; }
    .loading { text-align: center; color: #999; padding: 40px; }
    .footer { text-align: center; margin-top: 30px; }
    .footer a { color: #0066cc; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/feed.html">Ledger</a>
      <a href="/about.html" class="active">Strategy</a>
      <a href="/contact.html">Contact</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
    <div id="strategy" class="strategy-content">
      <div class="loading">Loading strategy protocol...</div>
    </div>
  </div>
  <div class="footer">
    <a href="/feed.html">View Protocol Ledger →</a>
  </div>

  <script>
    const md = window.markdownit();
    async function loadStrategy() {
      try {
        const response = await fetch('/api/strategy');
        if (!response.ok) throw new Error('Strategy not found');
        const text = await response.text();
        document.getElementById('strategy').innerHTML = md.render(text);
      } catch (e) {
        document.getElementById('strategy').innerHTML = '<p style="color:red">Failed to load protocol strategy.</p>';
      }
    }
    loadStrategy();
  </script>
</body>
</html>
