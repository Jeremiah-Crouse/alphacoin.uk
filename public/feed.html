<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Ledger - alphacoin.uk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .logo {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #333;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-bottom: 30px;
      border-bottom: 1px solid #f0f0f0;
    }

    .chat-entry {
      padding: 15px;
      border-radius: 8px;
      position: relative;
      max-width: 85%;
    }

    .role-user {
      align-self: flex-start;
      background-color: #f0f7ff;
      border: 1px solid #d0e3ff;
    }

    .role-admin {
      align-self: flex-end;
      background-color: #f5f5f5;
      border: 1px solid #e0e0e0;
      text-align: right;
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
      gap: 20px;
    }

    .role-admin .entry-header {
      flex-direction: row-reverse;
    }

    .entry-name {
      font-weight: 600;
      color: #333;
    }

    .content-body {
      font-size: 15px;
      line-height: 1.5;
      color: #333;
      word-wrap: break-word;
    }

    .content-body p {
      margin-bottom: 10px;
    }

    .content-body p:last-child {
      margin-bottom: 0;
    }

    .admin-badge {
      position: absolute;
      top: -10px;
      right: 10px;
      background: #333;
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #1a1a1a;
      margin: -40px -40px 30px -40px;
      border-radius: 8px 8px 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-bar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .nav-bar a:hover {
      color: #3399ff;
    }

    .nav-bar a.active {
      border-bottom: 2px solid #3399ff;
    }

    .balance-check {
      background: #eee;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 30px;
      text-align: center;
      border: 1px solid #ddd;
    }

    .balance-check input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 250px;
      margin: 0 10px;
    }

    .balance-check button {
      padding: 8px 16px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #balanceResult {
      margin-top: 10px;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 60px 20px;
    }

    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .refresh-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/feed.html" class="active">Ledger</a>
      <a href="/about.html">Strategy</a>
      <a href="/contact.html">Contact</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
    <div class="header">
      <div class="logo">
        <img src="images/acl.svg" alt="alphacoin">
      </div>
      <h1>Protocol Ledger</h1>
    </div>

    <div class="balance-check">
      <strong>Sovereign Access:</strong> 
      <input type="email" id="checkEmail" placeholder="Enter email to check balance...">
      <button onclick="checkBalance()">Verify</button>
      <div id="balanceResult"></div>
    </div>

    <div class="load-more-container">
      <div id="loadMoreSentinel" style="height: 20px; margin-bottom: 20px; color: #999; font-size: 12px; display: none; text-align: center;">Retrieving older records...</div>
    </div>
    
    <div id="feed" class="feed">
      <div class="loading">Loading protocol archives...</div>
    </div>

    <div class="footer">
      <a href="/">← Home</a>
      <a href="/contact.html">Send Message →</a>
      <br>
      <button class="refresh-btn" onclick="location.reload()">Refresh Feed</button>
    </div>
  </div>

  <script>
    let oldestTimestamp = null;
    let newestTimestamp = null;
    let loadingOlder = false;
    const feedDiv = document.getElementById('feed');
    const sentinel = document.getElementById('loadMoreSentinel');

    function createMessageGroup(msg) {
      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group';
      messageGroup.dataset.timestamp = msg.timestamp;

      if (msg.conversation && Array.isArray(msg.conversation)) {
        msg.conversation.forEach(entry => {
          const entryDiv = document.createElement('div');
          entryDiv.className = `chat-entry role-${entry.role}`;
          
          const header = document.createElement('div');
          header.className = 'entry-header';
          const name = entry.role === 'admin' ? 'Admin' : msg.name;
          header.innerHTML = `
            <span class="entry-name">${escapeHtml(name)}</span>
            <span>${formatTime(entry.timestamp)}</span>
          `;

          const content = document.createElement('div');
          content.className = 'content-body';
          if (entry.html) {
            content.innerHTML = entry.html;
          } else {
            content.textContent = entry.content;
          }

          if (entry.role === 'admin') {
            const badge = document.createElement('div');
            badge.className = 'admin-badge';
            badge.textContent = 'RESPONSE';
            entryDiv.appendChild(badge);
          }

          entryDiv.appendChild(header);
          entryDiv.appendChild(content);
          messageGroup.appendChild(entryDiv);
        });
      }
      return messageGroup;
    }

    async function loadInitial() {
      try {
        const response = await fetch('/api/messages?limit=20');
        const messages = await response.json();
        feedDiv.innerHTML = '';

        if (messages.length === 0) {
          feedDiv.innerHTML = '<div class="empty-state"><p>No correspondence found in the archives.</p></div>';
          return;
        }

        messages.forEach(msg => feedDiv.appendChild(createMessageGroup(msg)));
        
        oldestTimestamp = messages[0].timestamp;
        newestTimestamp = messages[messages.length - 1].timestamp;
        sentinel.style.display = 'block';
        
        window.scrollTo(0, document.body.scrollHeight);
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function loadOlder() {
      if (loadingOlder || !oldestTimestamp) return;
      loadingOlder = true;
      sentinel.textContent = "Retrieving older records...";
      
      try {
        const prevHeight = document.body.scrollHeight;
        const response = await fetch(`/api/messages?limit=20&before=${oldestTimestamp}`);
        const olderMessages = await response.json();

        if (olderMessages.length === 0) {
          sentinel.textContent = "Beginning of Archive Reached";
          oldestTimestamp = null;
          return;
        }

        olderMessages.reverse().forEach(msg => {
          feedDiv.insertBefore(createMessageGroup(msg), feedDiv.firstChild);
        });

        oldestTimestamp = olderMessages[olderMessages.length - 1].timestamp;
        window.scrollTo(0, document.body.scrollHeight - prevHeight);
      } catch (e) {
        console.error('Error loading history:', e);
      } finally {
        loadingOlder = false;
      }
    }

    async function refreshNew() {
      if (!newestTimestamp) return;
      const wasAtBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 100);

      try {
        const response = await fetch(`/api/messages?after=${newestTimestamp}`);
        const newMessages = await response.json();
        
        newMessages.forEach(msg => {
          feedDiv.appendChild(createMessageGroup(msg));
          newestTimestamp = msg.timestamp;
        });

        if (wasAtBottom && newMessages.length > 0) {
          window.scrollTo(0, document.body.scrollHeight);
        }
      } catch (e) { console.error('Refresh error:', e); }
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function checkBalance() {
      const email = document.getElementById('checkEmail').value.trim();
      if (!email) return;
      document.getElementById('balanceResult').textContent = "Querying ledger...";
      try {
        const response = await fetch(`/api/balance/${encodeURIComponent(email)}`);
        const data = await response.json();
        document.getElementById('balanceResult').innerHTML = 
          `Balance for <strong>${escapeHtml(data.email)}</strong>: <span style="font-weight:bold; color:#0066cc;">${data.balance} Alphacoins</span>`;
      } catch (e) {
        document.getElementById('balanceResult').textContent = "Error accessing ledger.";
      }
    }

    window.addEventListener('scroll', () => {
      if (window.scrollY < 100) {
        loadOlder();
      }
    });

    loadInitial();
    setInterval(refreshNew, 30000);
  </script>
</body>
</html>
