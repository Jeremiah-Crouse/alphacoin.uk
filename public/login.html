<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Login - alphacoin.uk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .container { width: 100%; max-width: 400px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .nav-bar { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #1a1a1a; margin: -40px -40px 30px -40px; border-radius: 8px 8px 0 0; position: sticky; top: 0; z-index: 100; }
    .nav-bar a { color: white; text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
    .nav-bar a:hover { color: #3399ff; }
    .header { text-align: center; margin-bottom: 30px; }
    .logo { width: 60px; height: 60px; margin-bottom: 10px; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
    button { width: 100%; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .error { color: #d32f2f; font-size: 14px; margin-bottom: 15px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/feed.html">Ledger</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
    <div class="header">
      <img src="images/acl.svg" alt="logo" class="logo">
      <h2>Protocol Access</h2>
    </div>
    <div id="error" class="error"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 14px;">
      New to the protocol? <a href="/contact.html" style="color: #0066cc;">Register here</a>.
    </p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('alphacoin_user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('error').textContent = data.error;
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
