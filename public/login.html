<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alphacoin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 400px; width: 100%; }
        h1 { color: #1a1a2e; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #2196F3; }
        button { width: 100%; padding: 14px; background: #2196F3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #1976D2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .links { text-align: center; margin-top: 20px; color: #666; }
        .links a { color: #2196F3; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo svg { width: 80px; height: 80px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#2196F3" stroke-width="4"/>
                <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="bold" fill="#2196F3">α</text>
            </svg>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Login to access your Alpha Coins</p>
        
        <div id="message" class="message" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>
        
        <div class="links">
            Don't have an account? <a href="/register.html">Register</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // Check if already logged in
        const savedUser = localStorage.getItem('alphacoin_user');
        if (savedUser) {
            window.location.href = '/dashboard.html';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('alphacoin_user', JSON.stringify(data.user));
                    messageEl.className = 'message success';
                    messageEl.textContent = 'Login successful! Redirecting...';
                    messageEl.style.display = 'block';
                    setTimeout(() => window.location.href = '/dashboard.html', 1000);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = error.message;
                messageEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
