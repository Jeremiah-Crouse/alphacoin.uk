<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Alphacoin - Digital Gold Standard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #f5f5f5; 
      color: #1a1a1a; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }
    .nav-bar { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      padding: 15px; 
      background: #1a1a1a; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
    }
    .nav-bar a { 
      color: white; 
      text-decoration: none; 
      font-size: 14px; 
      font-weight: 500; 
      letter-spacing: 1px; 
      transition: color 0.2s; 
    }
    .nav-bar a:hover { color: #0066cc; }
    
    .container { 
      max-width: 900px; 
      margin: 40px auto; 
      background: white; 
      border: 1px solid #e0e0e0; 
      border-radius: 8px; 
      padding: 60px 40px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
      text-align: center;
    }
    
    .logo { width: 100px; height: 100px; margin-bottom: 20px; }
    h1 { 
      font-size: 3rem; 
      font-weight: 800; 
      margin-bottom: 10px; 
      color: #1a1a1a; 
    }
    .tagline { 
      font-size: 1.2rem; 
      color: #666; 
      margin-bottom: 40px; 
    }
    
    .cta-buttons { 
      display: flex; 
      gap: 20px; 
      justify-content: center; 
      margin-bottom: 50px;
    }
    .btn { 
      padding: 12px 32px; 
      border-radius: 4px; 
      font-size: 16px; 
      font-weight: 600; 
      text-decoration: none; 
      transition: all 0.2s ease; 
      display: inline-block;
    }
    .btn-primary { 
      background: #0066cc; 
      color: white; 
    }
    .btn-primary:hover { 
      background: #0052a3; 
      transform: translateY(-1px);
    }
    .btn-secondary { 
      background: white; 
      border: 1px solid #e0e0e0; 
      color: #1a1a1a; 
    }
    .btn-secondary:hover { 
      background: #fafafa; 
    }
    
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 20px; 
      border-top: 1px solid #eee; 
      padding-top: 40px;
    }
    .stat-card { padding: 10px; }
    .stat-value { 
      font-size: 24px; 
      font-weight: 700; 
      color: #0066cc; 
    }
    .stat-label { 
      font-size: 12px; 
      color: #888; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-top: 5px;
    }
    
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .cta-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a href="/">Home</a>
    <a href="/feed.html">Ledger</a>
    <a href="/about.html">Strategy</a>
    <a href="/contact.html">Contact</a>
    <a href="/dashboard.html">Dashboard</a>
  </div>

  <div class="container">
    <img src="images/acl.svg" alt="Alphacoin Logo" class="logo">
    <h1>Alphacoin</h1>
    <p class="tagline">The World's Digital Gold Standard</p>
    
    <div class="cta-buttons">
      <a href="/register.html" class="btn btn-primary">Join the Protocol</a>
      <a href="/about.html" class="btn btn-secondary">Read Strategy</a>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">1.1M AC</div>
        <div class="stat-label">Total Supply</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">100K AC</div>
        <div class="stat-label">Velocity Pool</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">25 AC</div>
        <div class="stat-label">Signup Grant</div>
      </div>
    </div>
  </div>
</body>
</html>
