<!DOCTYPE HTML>
<head>
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    a {
      text-decoration: none;
      cursor: pointer;
    }
    
    img {
      max-width: 120%;
      max-height: 120%;
      width: auto;
      height: 50vh;
      transition: opacity 0.3s ease;
    }
    
    a:hover img {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <a href="/contact.html">
    <img src="images/acl.svg" alt="Contact Admin">
  </a>
</body>
