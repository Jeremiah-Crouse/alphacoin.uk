<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Alphacoin - Digital Gold Standard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 18px;
      color: #a0a0a0;
      margin-bottom: 40px;
    }
    .cta-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 15px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      color: #1a1a2e;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #00d4ff;
      color: #00d4ff;
    }
    .btn-secondary:hover {
      background: rgba(0, 212, 255, 0.1);
    }
    .stats {
      margin-top: 50px;
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #00d4ff;
    }
    .stat-label {
      font-size: 12px;
      color: #a0a0a0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(10px);
    }
    nav .logo-small {
      width: 40px;
      height: 40px;
    }
    nav .nav-links {
      display: flex;
      gap: 30px;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    nav a:hover {
      color: #00d4ff;
    }
    .hero {
      margin-top: 80px;
    }
  </style>
</head>
<body>
  <nav>
    <img src="images/acl.svg" class="logo-small" alt="Alphacoin">
    <div class="nav-links">
      <a href="/about.html">Strategy</a>
      <a href="/feed.html">Ledger</a>
      <a href="/contact.html">Contact</a>
    </div>
  </nav>
  
  <div class="container hero">
    <img src="images/acl.svg" class="logo" alt="Alphacoin">
    <h1>Alphacoin</h1>
    <p class="tagline">The World's Digital Gold Standard</p>
    
    <div class="cta-buttons">
      <a href="/register.html" class="btn btn-primary">Get Started</a>
      <a href="/about.html" class="btn btn-secondary">Learn More</a>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value">1.1M</div>
        <div class="stat-label">Total Supply</div>
      </div>
      <div class="stat">
        <div class="stat-value">100K</div>
        <div class="stat-label">In Circulation</div>
      </div>
      <div class="stat">
        <div class="stat-value">10 AC</div>
        <div class="stat-label">New User Grant</div>
      </div>
    </div>
  </div>
</body>
</html>
