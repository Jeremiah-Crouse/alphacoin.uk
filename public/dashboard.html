<!DOCTYPE HTML>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/acl.svg">
  <title>Dashboard - alphacoin.uk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .nav-bar { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #1a1a1a; margin: -40px -40px 30px -40px; border-radius: 8px 8px 0 0; position: sticky; top: 0; z-index: 100; }
    .nav-bar a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 1px; transition: color 0.2s; }
    .nav-bar a:hover { color: #3399ff; }
    .nav-bar a.active { border-bottom: 2px solid #3399ff; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
    .logo { width: 50px; height: 50px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .stat-card { padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
    .stat-value { font-size: 24px; font-weight: bold; color: #0066cc; margin-top: 5px; }
    .faucet-box { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
    .btn { padding: 12px 24px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/feed.html">Ledger</a>
      <a href="/about.html">Strategy</a>
      <a href="/contact.html">Contact</a>
      <a href="/dashboard.html" class="active">Dashboard</a>
    </div>
    <div class="header">
      <img src="images/acl.svg" alt="logo" class="logo">
      <h1 id="welcomeTitle">Protocol Dashboard</h1>
    </div>

    <div id="authPrompt" class="hidden">
      <p>Please <a href="/login.html">login</a> or <a href="/contact.html">register</a> to view your dashboard.</p>
    </div>

    <div id="dashboardContent">
      <div class="stats-grid">
        <div class="stat-card">
          <label>Your Balance</label>
          <div id="userBalance" class="stat-value">-- AC</div>
        </div>
        <div class="stat-card">
          <label>Circulation Velocity</label>
          <div id="totalSupply" class="stat-value">-- AC</div>
        </div>
      </div>

      <div id="faucetBox" class="faucet-box hidden">
        <h3>Genesis Allocation Available</h3>
        <p style="margin: 10px 0;">As a verified member, you are eligible for 10 Alpha Coins.</p>
        <button id="claimBtn" class="btn" onclick="claimFaucet()">Claim 10 AC</button>
      </div>

      <div class="stat-card">
        <h3>Protocol Metrics</h3>
        <p style="margin-top: 10px;">Total Registered Users: <span id="totalUsers">--</span></p>
        <p>Faucet Remaining: <span id="faucetRemaining">--</span> AC</p>
      </div>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      const user = JSON.parse(localStorage.getItem('alphacoin_user'));
      if (!user || !user.email) {
        document.getElementById('dashboardContent').classList.add('hidden');
        document.getElementById('authPrompt').classList.remove('hidden');
        return;
      }

      document.getElementById('welcomeTitle').textContent = `Welcome, ${user.name || 'Sovereign'}`;

      try {
        const response = await fetch(`/api/dashboard/${encodeURIComponent(user.email)}`);
        const data = await response.json();

        if (data.error) throw new Error(data.error);

        document.getElementById('userBalance').textContent = `${data.balance} AC`;
        document.getElementById('totalSupply').textContent = `${data.protocolStats.totalSupply} AC`;
        document.getElementById('totalUsers').textContent = data.protocolStats.totalUsers;
        document.getElementById('faucetRemaining').textContent = data.protocolStats.faucetRemaining;

        if (data.faucet.available) {
          document.getElementById('faucetBox').classList.remove('hidden');
        }
      } catch (e) {
        console.error('Dash error:', e);
      }
    }

    async function claimFaucet() {
      const user = JSON.parse(localStorage.getItem('alphacoin_user'));
      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const response = await fetch('/api/faucet/claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: user.email })
        });
        const data = await response.json();
        alert(data.message);
        location.reload();
      } catch (e) {
        alert('Claim failed. Please try again.');
        btn.disabled = false;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
